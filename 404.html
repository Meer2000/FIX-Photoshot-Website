  <style>
    html {
      font-family: 'Inter', sans-serif;
    }
    body { 
      background-color: #f8fafc; /* bg-slate-50 */
      background-image: linear-gradient(to bottom right, #f8fafc, #f1f5f9);
      color: #1e293b; /* text-slate-800 */
    }
    /* Accessibility & Animation */
    :focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
      border-radius: 4px;
    }
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .animate-marquee {
      animation: marquee 40s linear infinite;
    }

    /* Added for section reveal animations */
    @keyframes fadeInSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-slide-up {
      animation: fadeInSlideUp 0.5s ease-out forwards;
    }

    /* --- In-Place Edit Mode Styles --- */
    .editable-highlight-base {
      cursor: pointer;
    }
    .editable-highlight {
      position: relative;
      outline: 2px dashed rgba(67, 56, 202, 0.6);
      outline-offset: 4px;
      box-shadow: 0 0 0 4px white;
      border-radius: 4px;
      transition: outline-color 0.2s ease-in-out;
    }
    .editable-highlight:hover {
        outline-color: rgba(99, 102, 241, 1);
    }
    .editable-selected {
      outline: 2px solid rgba(99, 102, 241, 1);
      outline-offset: 4px;
    }
    [contenteditable="true"]:focus {
        outline: none;
    }
    .floating-edit-bar {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }
     .inline-toolbar {
      position: fixed;
      z-index: 101;
    }
