

@if (selection(); as sel) {
  <div 
    class="inline-toolbar bg-slate-800 text-white rounded-xl shadow-2xl p-1 flex items-center gap-1 transition-all duration-150 ease-out animate-fade-in-down"
    [style.top]="position().top"
    [style.left]="position().left"
    (click)="$event.stopPropagation()"
  >
    <!-- Group 1: Text & Style -->
    <div class="flex items-center border-r border-slate-600 pr-2">
      <!-- Font Size -->
      <div class="flex items-center pl-2">
        <input 
          type="number"
          [value]="currentFontSize()"
          (input)="handleFontSizeChange($event)"
          min="8"
          max="200"
          class="w-12 bg-transparent text-white text-center font-medium focus:outline-none p-1 rounded-md hover:bg-slate-700"
          title="Font Size (px)"
        />
        <span class="text-slate-400 text-sm pr-1">px</span>
      </div>
      <!-- Bold -->
      <button 
        (mousedown)="toggleBold($event)"
        [class]="'p-2 rounded-full hover:bg-slate-700 transition-colors ' + (isBold() ? 'bg-slate-600 text-blue-400' : '')"
        title="Bold"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586v5.828A2 2 0 0110.586 10H8v4h2.5a2 2 0 110 4H6a2 2 0 01-2-2V4zm4 2v2h2.5a.5.5 0 000-1H8V6z" clip-rule="evenodd" /></svg>
      </button>
       <!-- Italic -->
      <button 
        (mousedown)="toggleItalic($event)"
        [class]="'p-2 rounded-full hover:bg-slate-700 transition-colors ' + (isItalic() ? 'bg-slate-600 text-blue-400' : '')"
        title="Italic"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M5.75 3a.75.75 0 000 1.5h3.5a.75.75 0 000-1.5h-3.5zM6 6.5a.75.75 0 01.75-.75h5.5a.75.75 0 010 1.5H10V12h1.25a.75.75 0 010 1.5H8.75V7.25H6.75A.75.75 0 016 6.5zM5 15.25a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5a.75.75 0 01-.75-.75z" /></svg>
      </button>
    </div>
    
    <!-- Group 2: Align & Color -->
    <div class="flex items-center border-r border-slate-600 px-1">
      <!-- Text Align -->
      <button (mousedown)="handleTextAlignChange('left', $event)" [class]="'p-2 rounded-full hover:bg-slate-700 transition-colors ' + (textAlign() === 'left' ? 'bg-slate-600 text-blue-400' : '')" title="Align Left">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2 5a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zM2 9a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zM2 13a1 1 0 011-1h8a1 1 0 110 2H3a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
      </button>
      <button (mousedown)="handleTextAlignChange('center', $event)" [class]="'p-2 rounded-full hover:bg-slate-700 transition-colors ' + (textAlign() === 'center' ? 'bg-slate-600 text-blue-400' : '')" title="Align Center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2 5a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zm0 4a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zm3 4a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
      </button>
      <button (mousedown)="handleTextAlignChange('right', $event)" [class]="'p-2 rounded-full hover:bg-slate-700 transition-colors ' + (textAlign() === 'right' ? 'bg-slate-600 text-blue-400' : '')" title="Align Right">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2 5a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zm2 4a1 1 0 011-1h12a1 1 0 110 2H5a1 1 0 01-1-1zm-2 4a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
      </button>
       <!-- Color -->
      <div class="relative w-8 h-8 flex items-center justify-center ml-1">
        <input 
          type="color"
          [value]="currentBlockStyle().color || '#1e293b'"
          (input)="handleColorChange($event)"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
          title="Text Color"
        />
        <div 
          class="w-5 h-5 rounded-full border-2 border-slate-500 pointer-events-none"
          [style.background-color]="currentBlockStyle().color"
        ></div>
      </div>
      <!-- Gradient -->
      <button 
        (mousedown)="toggleGradient($event)"
        [class]="'p-2 rounded-full hover:bg-slate-700 transition-colors ' + (isGradient() ? 'bg-slate-600 text-blue-400' : '')"
        title="Gradient Text"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2H4zm.293 3.293a1 1 0 011.414 0L10 10.586l4.293-4.293a1 1 0 111.414 1.414L11.414 12l4.293 4.293a1 1 0 01-1.414 1.414L10 13.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 12 4.293 7.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
      @if (isGradient()) {
          <div class="flex items-center gap-2 pl-2">
            <span class="text-xs text-slate-400">From</span>
            <input 
              type="color" 
              [value]="gradientFrom()" 
              (input)="handleGradientFromChange($event)" 
              class="w-6 h-6 p-0 border-none rounded-md bg-transparent cursor-pointer"
              title="Gradient Start Color"
            />
            <span class="text-xs text-slate-400">To</span>
            <input 
              type="color" 
              [value]="gradientTo()" 
              (input)="handleGradientToChange($event)" 
              class="w-6 h-6 p-0 border-none rounded-md bg-transparent cursor-pointer"
              title="Gradient End Color"
            />
          </div>
        }
    </div>

     <!-- Group 3: Spacing & Opacity -->
    <div class="flex items-center gap-2 pl-2 pr-1">
      <!-- Letter Spacing -->
      <div class="flex items-center gap-1" title="Letter Spacing (px)">
        <span class="text-xs text-slate-400">Spacing</span>
        <input type="number" step="0.1" [value]="currentLetterSpacing()" (input)="handleLetterSpacingChange($event)" class="w-10 bg-slate-700 text-white text-center font-medium focus:outline-none p-0.5 rounded-md">
      </div>
      <!-- Line Height -->
      <div class="flex items-center gap-1" title="Line Height (e.g., 1.5)">
        <span class="text-xs text-slate-400">Height</span>
        <input type="number" step="0.1" [value]="currentLineHeight()" (input)="handleLineHeightChange($event)" class="w-10 bg-slate-700 text-white text-center font-medium focus:outline-none p-0.5 rounded-md">
      </div>
       <!-- Opacity -->
      <div class="flex items-center gap-1" title="Opacity">
         <span class="text-xs text-slate-400">Opacity</span>
         <input type="range" min="0" max="100" [value]="currentOpacity()" (input)="handleOpacityChange($event)" class="w-16">
         <span class="text-xs w-8 text-center tabular-nums">{{ currentOpacity() }}%</span>
      </div>
    </div>
  </div>
}

<style>
.animate-fade-in-down {
  animation: fadeInDown 0.2s ease-out forwards;
}
@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
}
input[type="color"]::-webkit-color-swatch {
  border: 1px solid #64748b; /* slate-500 */
  border-radius: 0.25rem;
}
</style>
