<div 
  class="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in"
  (click)="close.emit()"
>
  <!-- Close Button -->
  <button 
    (click)="close.emit()" 
    class="absolute top-4 right-4 text-white/70 hover:text-white transition-colors z-20 p-2"
    aria-label="Close image viewer"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
  
  <!-- Main Content -->
  <div class="relative w-full h-full flex items-center justify-center" (click)="$event.stopPropagation()">
    <!-- Loading Spinner -->
    @if (!isLoaded()) {
        <div class="absolute text-white/80 z-0">
            <svg class="animate-spin h-10 w-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
    }

    <!-- Image -->
    <img 
      [src]="imageUrls()[currentIndex()]" 
      alt="Portfolio full-size view" 
      class="max-w-full max-h-full object-contain rounded-2xl shadow-2xl transition-opacity duration-300 animate-scale-in z-10"
      [class.opacity-0]="!isLoaded()"
      [class.opacity-100]="isLoaded()"
      (load)="isLoaded.set(true)"
    />

    <!-- Counter -->
    @if (imageUrls().length > 1) {
      <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/50 text-white text-sm font-semibold px-3 py-1 rounded-full backdrop-blur-sm z-20">
        {{ currentIndex() + 1 }} / {{ imageUrls().length }}
      </div>
    }
  </div>

  <!-- Navigation Arrows -->
  @if (imageUrls().length > 1) {
    <button 
      (click)="$event.stopPropagation(); previous()" 
      class="absolute left-4 top-1/2 -translate-y-1/2 p-2 bg-white/20 rounded-full hover:bg-white/40 transition-colors text-white z-20"
      aria-label="Previous image"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <button 
      (click)="$event.stopPropagation(); next()" 
      class="absolute right-4 top-1/2 -translate-y-1/2 p-2 bg-white/20 rounded-full hover:bg-white/40 transition-colors text-white z-20"
      aria-label="Next image"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  }
</div>
