<div class="fixed inset-0 bg-slate-900/70 z-[150] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden animate-slide-up">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-slate-200 flex-shrink-0">
      <h2 class="text-lg font-semibold text-slate-800">Edit Image</h2>
      
      <!-- Toolbar -->
      @if (!isError() && !isLoading()) {
        <div class="flex items-center gap-2">
          <button (click)="zoom(0.1)" title="Zoom In" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
          </button>
          <button (click)="zoom(-0.1)" title="Zoom Out" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" /></svg>
          </button>
          <div class="w-px h-5 bg-slate-200 mx-1"></div>
          <button (click)="rotate(-45)" title="Rotate Left" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" transform="scale(-1, 1)" viewBox="0 0 20 20" fill="currentColor"><path d="M15.54 4.46a1 1 0 00-1.42 0L3.41 15.17a1 1 0 001.42 1.42l10.7-10.7a1 1 0 000-1.42zM10 3a.75.75 0 00-.75.75v1.54l-1.5-1.5A.75.75 0 006.7 4.84l1.5 1.5V7.5A.75.75 0 009 8.25h1.16l-2.1 2.1a.75.75 0 001.06 1.06l2.1-2.1V10.5A.75.75 0 0012 11.25h1.16l-3.6 3.6a.75.75 0 001.06 1.06l3.6-3.6V13.5a.75.75 0 001.5 0V3.75A.75.75 0 0010 3z" /></svg>
          </button>
          <button (click)="rotate(45)" title="Rotate Right" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M15.54 4.46a1 1 0 00-1.42 0L3.41 15.17a1 1 0 001.42 1.42l10.7-10.7a1 1 0 000-1.42zM10 3a.75.75 0 00-.75.75v1.54l-1.5-1.5A.75.75 0 006.7 4.84l1.5 1.5V7.5A.75.75 0 009 8.25h1.16l-2.1 2.1a.75.75 0 001.06 1.06l2.1-2.1V10.5A.75.75 0 0012 11.25h1.16l-3.6 3.6a.75.75 0 001.06 1.06l3.6-3.6V13.5a.75.75 0 001.5 0V3.75A.75.75 0 0010 3z" /></svg>
          </button>
          <div class="w-px h-5 bg-slate-200 mx-1"></div>
          <button (click)="flipHorizontal()" title="Flip Horizontal" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M4.34 2.345a1 1 0 011.32 0l4 4.5a1 1 0 010 1.31l-4 4.5a1 1 0 01-1.32 0L.34 8.155a1 1 0 010-1.31l4-4.5zM15.66 2.345a1 1 0 00-1.32 0l-4 4.5a1 1 0 000 1.31l4 4.5a1 1 0 001.32 0l4-4.5a1 1 0 000-1.31l-4-4.5zM9 10a1 1 0 01.34-.755l4-4.5a1 1 0 10-1.32-1.49l-4 4.5a1 1 0 000 1.49l4 4.5a1 1 0 101.32-1.49L9.34 10.755A1 1 0 019 10z" /></svg>
          </button>
          <button (click)="flipVertical()" title="Flip Vertical" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" transform="rotate(90)" viewBox="0 0 20 20" fill="currentColor"><path d="M4.34 2.345a1 1 0 011.32 0l4 4.5a1 1 0 010 1.31l-4 4.5a1 1 0 01-1.32 0L.34 8.155a1 1 0 010-1.31l4-4.5zM15.66 2.345a1 1 0 00-1.32 0l-4 4.5a1 1 0 000 1.31l4 4.5a1 1 0 001.32 0l4-4.5a1 1 0 000-1.31l-4-4.5zM9 10a1 1 0 01.34-.755l4-4.5a1 1 0 10-1.32-1.49l-4 4.5a1 1 0 000 1.49l4 4.5a1 1 0 101.32-1.49L9.34 10.755A1 1 0 019 10z" /></svg>
          </button>
           <div class="w-px h-5 bg-slate-200 mx-1"></div>
          <button (click)="reset()" title="Reset" class="p-2 rounded-md hover:bg-slate-200/70 text-slate-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" /></svg>
          </button>
        </div>
      }

      <button (click)="close.emit()" class="p-2 rounded-full hover:bg-slate-100 text-slate-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="flex-grow bg-slate-200/50 relative overflow-hidden flex items-center justify-center">
      @if (isError()) {
        <div class="text-center p-8">
          <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-slate-700 font-semibold mt-4">Image Editor Failed to Load</p>
          <p class="text-slate-500 text-sm mt-1">Please check your internet connection.</p>
          <button (click)="retryInit()" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-2xl shadow-md hover:shadow-lg active:scale-95 transition-all duration-200">
            Retry
          </button>
        </div>
      } @else {
        <div class="cropper-container" [class.invisible]="isLoading()">
          <img #image [src]="imageData()" alt="Image to edit" />
        </div>
      }
      
      @if (isLoading() && !isError()) {
        <div class="absolute inset-0 bg-white/70 flex items-center justify-center z-10">
          <div class="text-center">
            <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-slate-600 font-medium mt-2">Loading Editor...</p>
          </div>
        </div>
      }
    </main>

    <!-- Footer -->
    <footer class="flex-shrink-0 flex justify-end items-center p-4 gap-4 bg-slate-50 border-t border-slate-200">
      <button (click)="close.emit()" class="bg-white text-slate-800 font-semibold py-2 px-5 rounded-2xl border border-slate-300 hover:bg-slate-50 hover:border-slate-400 active:scale-95 transition-all duration-200">
        Cancel
      </button>
      @if (!isError() && !isLoading()) {
        <button (click)="onSave()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-2xl shadow-md hover:shadow-lg active:scale-95 transition-all duration-200">
          Save Changes
        </button>
      }
    </footer>
  </div>
</div>
