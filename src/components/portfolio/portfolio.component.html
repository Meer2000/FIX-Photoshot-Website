
@if(data(); as portfolio) {
<section id="portfolio" class="py-20 bg-white overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div [class]="'transition-all duration-1000 ease-out ' + (isVisible() ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12')">
      <h2 
        class="text-3xl lg:text-4xl font-bold text-center text-slate-800 mb-20"
        appEditable
        editableType="text"
        [editablePath]="'portfolio.heading'"
        [class.bg-clip-text]="portfolio.headingStyle?.isGradient"
        [class.text-transparent]="portfolio.headingStyle?.isGradient"
        [style.background-image]="portfolio.headingStyle?.isGradient ? 'linear-gradient(to right, ' + (portfolio.headingStyle?.gradientFrom || '#3b82f6') + ', ' + (portfolio.headingStyle?.gradientTo || '#14b8a6') + ')' : null"
        [style.color]="portfolio.headingStyle?.isGradient ? null : portfolio.headingStyle?.color"
        [style.font-size]="portfolio.headingStyle?.fontSize"
        [style.font-weight]="portfolio.headingStyle?.fontWeight"
        [style.font-style]="portfolio.headingStyle?.fontStyle"
        [style.text-align]="portfolio.headingStyle?.textAlign"
        [style.opacity]="portfolio.headingStyle?.opacity"
        [style.letter-spacing]="portfolio.headingStyle?.letterSpacing"
        [style.line-height]="portfolio.headingStyle?.lineHeight"
        [innerHTML]="portfolio.heading"
      >
      </h2>
    </div>
    <div 
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      cdkDropList
      [cdkDropListData]="portfolio.items"
      (cdkDropListDropped)="drop($event)"
      [cdkDropListDisabled]="!isEditMode()"
      >
      @for (item of portfolio.items; track item.id; let i = $index) {
        @let coverImage = item.images?.[0];
        <div 
          cdkDrag
          [cdkDragDisabled]="!isEditMode()"
          [class]="'group/item relative overflow-hidden rounded-2xl shadow-xl aspect-[3/2] transition-all duration-500 hover:shadow-2xl ' + (isVisible() ? 'animate-fade-in-slide-up' : 'opacity-0') + (isEditMode() ? ' cursor-move' : ' cursor-pointer')"
          [style.animation-delay]="i * 100 + 'ms'"
          (click)="openLightbox(item)"
          >
          <img [src]="coverImage?.thumbnail || 'https://iili.io/J151Sps.png'" [alt]="item.title" class="w-full h-full object-cover transform group-hover/item:scale-110 transition-transform duration-500 ease-in-out" loading="lazy" width="600" height="400" />
          
          <!-- Public View Title -->
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex items-end justify-start p-6 opacity-0 group-hover/item:opacity-100 transition-opacity duration-300">
            <h3 
              class="text-white text-lg lg:text-xl font-semibold transform transition-transform duration-300 group-hover/item:translate-y-0 translate-y-4"
              appEditable
              editableType="text"
              [editablePath]="'portfolio.items.' + i + '.title'"
              (click)="$event.stopPropagation()"
              [class.bg-clip-text]="item.titleStyle?.isGradient"
              [class.text-transparent]="item.titleStyle?.isGradient"
              [style.background-image]="item.titleStyle?.isGradient ? 'linear-gradient(to right, ' + (item.titleStyle?.gradientFrom || '#3b82f6') + ', ' + (item.titleStyle?.gradientTo || '#14b8a6') + ')' : null"
              [style.color]="item.titleStyle?.isGradient ? null : item.titleStyle?.color"
              [style.font-size]="item.titleStyle?.fontSize"
              [style.font-weight]="item.titleStyle?.fontWeight"
              [style.font-style]="item.titleStyle?.fontStyle"
              [style.text-align]="item.titleStyle?.textAlign"
              [style.opacity]="item.titleStyle?.opacity"
              [style.letter-spacing]="item.titleStyle?.letterSpacing"
              [style.line-height]="item.titleStyle?.lineHeight"
              [innerHTML]="item.title"
              ></h3>
          </div>

          <!-- Edit Mode UI -->
          @if (isEditMode()) {
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover/item:opacity-100 transition-opacity duration-300 flex items-center justify-center gap-3 p-4">
               <button (click)="triggerImageChange($event, item.id)" type="button" class="bg-white/20 backdrop-blur-md border border-white/30 text-white font-semibold py-2 px-4 rounded-2xl flex items-center gap-2 shadow-xl hover:bg-white/40 active:scale-95 transition-all duration-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M5.5 13a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.977A4.5 4.5 0 1113.5 13H11V9.414l-1.293 1.293a1 1 0 01-1.414-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L13 9.414V13H5.5z" /><path d="M9 13h2v5a1 1 0 11-2 0v-5z" /></svg>
                  <span>Change Images</span>
               </button>
               <button (click)="removeItem($event, item.id)" type="button" class="bg-red-500/50 backdrop-blur-md border border-white/20 text-white p-2.5 rounded-2xl shadow-xl hover:bg-red-500/70 active:scale-95 transition-all duration-300" title="Delete Item">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 011 1v6a1 1 0 11-2 0V9a1 1 0 011-1zm4 0a1 1 0 011 1v6a1 1 0 11-2 0V9a1 1 0 011-1z" clip-rule="evenodd" /></svg>
               </button>
            </div>
            <div cdkDragHandle class="absolute top-2 right-2 p-2 bg-white/20 backdrop-blur-md text-white rounded-full cursor-grab active:cursor-grabbing opacity-0 group-hover/item:opacity-100 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
            </div>
          }
        </div>
      }
      <!-- Add New Item Button -->
      @if (isEditMode()) {
        <div 
          [class]="'relative overflow-hidden rounded-2xl border-2 border-dashed border-slate-300 aspect-[3/2] flex items-center justify-center transition-all duration-300 hover:border-blue-500 hover:bg-blue-50 ' + (isVisible() ? 'animate-fade-in-slide-up' : 'opacity-0')"
          [style.animation-delay]="portfolio.items.length * 100 + 'ms'"
          >
          <button (click)="addItem()" type="button" class="text-center text-slate-500 hover:text-blue-600 transition-colors p-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
            <span class="mt-2 block font-semibold">Add New Item</span>
          </button>
        </div>
      }
    </div>
    <input type="file" #portfolioFileInput (change)="handleFileSelection($event)" accept="image/*" class="hidden" multiple>
  </div>
</section>
}
