<div class="fixed top-20 right-4 z-[200] w-full max-w-sm space-y-3">
  @for(toast of toasts(); track toast.id) {
    <div
      role="alert"
      [class]="'toast-item relative w-full flex items-start gap-3 rounded-2xl border p-4 shadow-lg ' + getBgClass(toast.type)"
    >
      <div class="flex-shrink-0">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          [class]="'h-6 w-6 ' + getIconClass(toast.type)"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            [attr.d]="getIcon(toast.type)"
          />
        </svg>
      </div>

      <div class="flex-1">
        <p class="block font-medium text-slate-800">{{ toast.message }}</p>
      </div>

      <button (click)="toastService.remove(toast.id)" class="text-slate-500 hover:text-slate-700">
        <span class="sr-only">Dismiss</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>
  }
</div>
